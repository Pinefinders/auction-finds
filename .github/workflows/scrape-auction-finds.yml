# Pinefinders Auction Finds — GitHub Actions workflow
# Runs daily to scrape EasyLive for pine lots and regenerate the finds page.
# Mirrors the auction-map / auction-finds-map setup so the Mac no longer
# needs to be awake for the scrape to run.

name: Scrape Auction Finds

on:
  schedule:
    # GitHub's scheduled trigger is unreliable — it silently skips runs
    # during high-load periods. Mitigation: fire at several staggered,
    # off-peak minutes through the early morning. A run that finds today's
    # data already committed exits cheaply (see the 'already-done' guard),
    # so redundant fires are nearly free. This keeps the site fresh even
    # when Ken's Mac is asleep or he's away — no external service needed.
    - cron: '17 5 * * *'   # 06:17 BST / 05:17 GMT
    - cron: '43 6 * * *'   # 07:43 BST / 06:43 GMT
    - cron: '11 8 * * *'   # 09:11 BST / 08:11 GMT (just after Ken's 09:00 check)
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: "scrape-auction-finds"
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Skip if already updated today
        id: guard
        run: |
          # If the latest commit on this branch already carries today's
          # UTC date in its "Auto update" message, a run today already
          # succeeded — skip the heavy scrape. Manual dispatches always run.
          today="$(date -u '+%Y-%m-%d')"
          last="$(git log -1 --pretty=%s)"
          if [ "${{ github.event_name }}" != "workflow_dispatch" ] \
             && printf '%s' "$last" | grep -q "Auto update: ${today}"; then
            echo "Already updated today ($today) — skipping."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Python
        if: steps.guard.outputs.skip != 'true'
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        if: steps.guard.outputs.skip != 'true'
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run scraper
        if: steps.guard.outputs.skip != 'true'
        env:
          GITHUB_WORKSPACE: ${{ github.workspace }}
        run: python scrape_auction_finds.py

      - name: Commit and push changes
        if: steps.guard.outputs.skip != 'true'
        run: |
          git config user.name "Pinefinders Bot"
          git config user.email "actions@pinefinders.github.io"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "Auto update: $(date -u '+%Y-%m-%d %H:%M UTC')"
          git pull --rebase --autostash
          git push --force-with-lease
